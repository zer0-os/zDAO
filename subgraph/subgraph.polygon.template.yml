specVersion: 0.0.2
repository: https://github.com/zer0-os/zdao-contracts
schema:
  file: ./schema.polygon.graphql
features:
  - nonFatalErrors
dataSources:
  - kind: ethereum/contract
    name: PolygonZDAOChef
    network: {{ network }}
    source:
      address: "{{ PolygonZDAOChef_address }}"
      abi: PolygonZDAOChef
      startBlock: {{ PolygonZDAOChef_start_block }}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - ZDAOInfo
      abis:
        - name: PolygonZDAOChef
          file: ./abis/PolygonZDAOChef.json
      eventHandlers:
        - event: DAOCreated(indexed address,indexed uint256,indexed address,uint256,uint256)
          handler: handleDAOCreated
        - event: DAODestroyed(indexed uint256)
          handler: handleDAODestroyed
        - event: ProposalCreated(indexed uint256,indexed uint256,indexed uint256,uint256,uint256)
          handler: handleProposalCreated
        - event: ProposalCanceled(indexed uint256,indexed uint256)
          handler: handleProposalCanceled
        - event: ProposalCalculated(indexed uint256,indexed uint256,uint256,uint256[])
          handler: handleProposalCalculated
        - event: CastVote(indexed uint256,indexed uint256,indexed address,uint256,uint256)
          handler: handleCastVote
      file: ./src/polygon/mapping.polygon.chef.ts
