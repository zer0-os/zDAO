specVersion: 0.0.2
repository: https://github.com/zer0-os/zdao-contracts
schema:
  file: ./schema.ethereum.graphql
features:
  - nonFatalErrors
dataSources:
  - kind: ethereum/contract
    name: ZDAORegistry
    network: {{ network }}
    source:
      address: "{{ ZDAORegistry_address }}"
      abi: ZDAORegistry
      startBlock: {{ ZDAORegistry_start_block }}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - ZDAORecord
        - ZNAAssociation
      abis:
        - name: ZDAORegistry
          file: ./abis/ZDAORegistry.json
      eventHandlers:
        - event: DAOCreated(indexed uint256,indexed uint256,indexed address,address,address)
          handler: handleDAOCreated
        - event: DAODestroyed(indexed uint256,indexed uint256)
          handler: handleDAODestroyed
        - event: LinkAdded(indexed uint256,indexed uint256,indexed uint256)
          handler: handleLinkAdded
        - event: LinkRemoved(indexed uint256,indexed uint256,indexed uint256)
          handler: handleLinkRemoved
      file: ./src/mapping.registry.ts

  - kind: ethereum/contract
    name: ZDAOModule
    network: {{ network }}
    source:
      address: "{{ ZDAOModule_address }}"
      abi: ZDAOModule
      startBlock: {{ ZDAOModule_start_block }}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - ExecutedProposal
      abis:
        - name: ZDAOModule
          file: ./abis/ZDAOModule.json
      eventHandlers:
        - event: ProposalExecuted(indexed uint256,uint256,address,address,uint256)
          handler: handleProposalExecuted
      file: ./src/mapping.module.ts

  - kind: ethereum/contract
    name: EthereumZDAOChef
    network: {{ network }}
    source:
      address: "{{ EthereumZDAOChef_address }}"
      abi: EthereumZDAOChef
      startBlock: {{ EthereumZDAOChef_start_block }}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - EthereumZDAO
        - EthereumProposal
      abis:
        - name: EthereumZDAOChef
          file: ./abis/EthereumZDAOChef.json
      eventHandlers:
        - event: DAOCreated(indexed uint256,indexed uint256,indexed address,address,address,address,uint256,uint256,uint256,uint256,uint256,uint256,bool)
          handler: handleDAOCreated
        - event: ProposalCreated(indexed uint256,indexed uint256,indexed uint256,address,uint256)
          handler: handleProposalCreated
        - event: ProposalCanceled(indexed uint256,indexed uint256,indexed address)
          handler: handleProposalCanceled
        - event: ProposalCalculated(indexed uint256,indexed uint256,uint256,uint256[])
          handler: handleProposalCalculated
      file: ./src/polygon/mapping.ethereum.chef.ts

  - kind: ethereum/contract
    name: SnapshotZDAOChef
    network: {{ network }}
    source:
      address: "{{ SnapshotZDAOChef_address }}"
      abi: SnapshotZDAOChef
      startBlock: {{ SnapshotZDAOChef_start_block }}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - SnapshotZDAO
      abis:
        - name: SnapshotZDAOChef
          file: ./abis/SnapshotZDAOChef.json
      eventHandlers:
        - event: DAOCreated(indexed uint256,indexed uint256,indexed address,address,string)
          handler: handleDAOCreated
      file: ./src/snapshot/mapping.chef.ts
